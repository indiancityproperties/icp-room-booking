<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ICP Room Display</title>
<style>
  :root{
    --navy:#0A1628; --navy-mid:#112240; --navy-light:#1A3460; --navy-border:#1E3A6E;
    --gold:#C9A84C; --gold-light:#E8C97A; --gold-soft:rgba(201,168,76,0.12);
    --white:#FFFFFF; --text-sec:#E8EAF2; --text-muted:#A88C4A;
    --free:#22C55E; --free-soft:rgba(34,197,94,0.08);
    --occupied:#EF4444; --occ-soft:rgba(239,68,68,0.08);
    --soon:#F59E0B; --soon-soft:rgba(245,158,11,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Segoe UI',Inter,-apple-system,sans-serif;background:var(--navy);color:var(--white);user-select:none;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:0.25;}50%{transform:scale(1.5);opacity:0.1;}}

  .app{display:flex;flex-direction:column;height:100vh;padding-top:0;}
  .app.has-demo{padding-top:42px;}

  /* Top bar */
  .topbar{background:var(--navy-mid);border-bottom:1px solid var(--navy-border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-icon{width:56px;height:56px;border-radius:9px;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
  .brand-name{font-size:13px;font-weight:800;color:var(--gold);}
  .brand-sub{font-size:10px;color:var(--text-sec);}
  .floor-tag{font-size:22px;font-weight:800;color:var(--gold);background:var(--gold-soft);padding:8px 20px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;}
  .live-tag{font-size:10px;color:var(--text-sec);display:flex;align-items:center;gap:6px;}
  .live-dot{width:6px;height:6px;border-radius:50%;background:var(--free);box-shadow:0 0 5px var(--free);display:inline-block;}

  /* Main */
  .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 32px;gap:0;overflow:hidden;}

  .status-block{width:100%;max-width:640px;border-radius:28px;padding:36px 44px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden;border:3px solid;cursor:default;}
  .status-block.touchable{cursor:pointer;}
  .pulse-wrap{display:flex;justify-content:center;margin-bottom:18px;}
  .pulse-dot{position:relative;width:26px;height:26px;}
  .pulse-ring{position:absolute;inset:0;border-radius:50%;animation:pulse 2s ease infinite;}
  .pulse-core{position:absolute;inset:4px;border-radius:50%;}
  .status-label{font-size:46px;font-weight:900;letter-spacing:3px;margin-bottom:6px;line-height:1;}
  .meeting-title{font-size:20px;font-weight:700;color:var(--white);margin-bottom:5px;}
  .meeting-time{font-size:14px;color:var(--text-sec);margin-bottom:3px;}
  .organizer-line{font-size:13px;color:var(--text-sec);}
  .time-chip{margin-top:14px;display:inline-block;border-radius:12px;padding:7px 18px;font-size:12px;font-weight:700;border:1px solid;}
  .free-next{font-size:13px;color:var(--text-sec);margin-top:14px;}
  .tap-hint{font-size:10px;color:var(--text-muted);margin-top:16px;letter-spacing:0.5px;}

  .clock-wrap{text-align:center;}
  .clock-time{font-size:46px;font-weight:900;color:var(--gold);letter-spacing:2px;font-variant-numeric:tabular-nums;line-height:1;}
  .clock-secs{font-size:24px;color:var(--gold-light);}
  .clock-date{font-size:12px;color:var(--text-sec);margin-top:4px;letter-spacing:0.5px;}

  .info-chips{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;justify-content:center;}
  .info-chip{font-size:11px;color:var(--text-sec);background:var(--navy-mid);border:1px solid var(--navy-border);padding:5px 14px;border-radius:20px;}

  /* Bottom schedule strip */
  .bottom-strip{background:var(--navy-mid);border-top:1px solid var(--navy-border);padding:14px 28px;flex-shrink:0;}
  .strip-label{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
  .strip-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
  .strip-row::-webkit-scrollbar{height:3px;}
  .strip-row::-webkit-scrollbar-thumb{background:var(--navy-border);border-radius:2px;}
  .strip-card{flex-shrink:0;background:var(--navy-light);border:1.5px solid var(--navy-border);border-radius:11px;padding:10px 14px;min-width:150px;cursor:pointer;}
  .strip-card.current{background:rgba(201,168,76,0.15);border-color:var(--gold);}
  .strip-card.past{opacity:0.45;}
  .strip-time{font-size:13px;font-weight:800;margin-bottom:3px;}
  .strip-title{font-size:12px;font-weight:600;color:var(--white);margin-bottom:2px;}
  .strip-host{font-size:10px;color:var(--text-sec);}
  .strip-now{margin-top:6px;font-size:10px;color:var(--gold);font-weight:700;}
  .strip-done{margin-top:6px;font-size:10px;color:var(--text-muted);}
  .strip-empty{font-size:12px;color:var(--text-muted);}

  /* Detail modal (touch to view) */
  .detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .detail-overlay.show{display:flex;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .detail-box{background:var(--navy-mid);border:1px solid var(--navy-border);border-radius:22px;padding:32px;width:100%;max-width:460px;box-shadow:0 30px 70px rgba(0,0,0,0.7);}
  .detail-head{font-size:22px;font-weight:800;margin-bottom:6px;}
  .detail-sub{font-size:12px;color:var(--gold);margin-bottom:20px;}
  .detail-rows{display:flex;flex-direction:column;gap:14px;}
  .detail-row{display:flex;align-items:center;gap:14px;}
  .detail-icon{font-size:18px;width:24px;}
  .detail-label{font-size:11px;color:var(--text-muted);width:80px;flex-shrink:0;text-transform:uppercase;letter-spacing:0.5px;}
  .detail-val{font-size:15px;font-weight:600;color:var(--white);}
  .detail-close{margin-top:26px;width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;color:var(--navy);border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;}

  /* Floor switcher (demo helper, top-left small) */
  .demo-switch{position:fixed;top:0;left:50%;transform:translateX(-50%);background:var(--navy-mid);border:1px solid var(--navy-border);border-top:none;border-radius:0 0 16px 16px;padding:8px 20px;z-index:999;display:flex;gap:12px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,0.4);}
  .demo-btn{padding:8px 20px;border-radius:10px;border:1px solid var(--navy-border);cursor:pointer;background:var(--navy-light);color:var(--text-sec);font-size:15px;font-weight:800;letter-spacing:0.5px;}
  .demo-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);border-color:var(--gold);}
  .demo-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy);}
</style>
</head>
<body>

<!-- Demo helper: lets you preview all 3 tablets in one file.
     In production, each tablet's URL has its own ?floor= parameter and this bar is hidden. -->
<div class="demo-switch" id="demoSwitch">
  <button class="demo-btn" data-floor="mfloor">M-Floor</button>
  <button class="demo-btn" data-floor="floor2">2nd Floor</button>
</div>

<div class="app" id="app"></div>

<div class="detail-overlay" id="detailOverlay">
  <div class="detail-box">
    <div class="detail-head" id="detailTitle"></div>
    <div class="detail-sub" id="detailSub"></div>
    <div class="detail-rows" id="detailRows"></div>
    <button class="detail-close" id="detailCloseBtn">Close</button>
  </div>
</div>

<script>
/* ============================================================
   ICP FLOOR DISPLAY — Android Tablet (Read-Only)
   Each tablet opens this same file with a URL parameter:
     admin-dashboard.html is for reception
     floor-display.html?floor=mfloor   -> M-Floor tablet
     floor-display.html?floor=floor2   -> 2nd Floor tablet
   Rules: no booking, no editing — view only. Tap a meeting card
   to see Organizer name + Department. No attendee names, no
   receptionist name are ever shown here.
   SHAREPOINT INTEGRATION POINT: replace loadBookings() with a
   GET call to your RoomBookings SharePoint list.
   ============================================================ */

const ROOMS = {
  mfloor: { floor:"M-Floor",   capacity:10, amenities:["Projector","Whiteboard","Video Conf"] },
  floor2: { floor:"2nd Floor", capacity:8,  amenities:["TV Screen","Whiteboard","WiFi"] },
};

function pad(n){return String(n).padStart(2,"0");}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function timeToMins(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function fmt12(t){
  const [h,m] = t.split(":").map(Number);
  const period = h>=12 ? "PM" : "AM";
  let h12 = h % 12; if(h12===0) h12=12;
  return `${h12}:${pad(m)} ${period}`;
}
const TODAY = todayStr();

/* ── MICROSOFT GRAPH API — Read Only ─────────────────────────
   Floor display is read-only — only fetches bookings.
   Uses MSAL for authentication. */
const MSAL_CONFIG = {
  auth: {
    clientId: "ef7f351e-a6e8-4e64-bda0-76ada332adfb",
    authority: "https://login.microsoftonline.com/aa5f83a0-efdf-4130-a31f-9f84d5bdfcb9",
    redirectUri: window.location.href.split('?')[0],
  },
  cache: { cacheLocation: "sessionStorage" }
};
const GRAPH_SCOPES = ["https://graph.microsoft.com/Sites.Read.All"];
let msalInstance = null, graphSiteId = null, graphListId = null;

async function initMSAL(){
  await new Promise((resolve, reject) => {
    if(window.msal){ resolve(); return; }
    const s = document.createElement('script');
    s.src = "https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js";
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
  msalInstance = new window.msal.PublicClientApplication(MSAL_CONFIG);
  await msalInstance.initialize();
  await msalInstance.handleRedirectPromise();
}

async function getGraphToken(){
  const accounts = msalInstance.getAllAccounts();
  if(accounts.length === 0){
    await msalInstance.loginRedirect({ scopes: GRAPH_SCOPES });
    return null;
  }
  try {
    const result = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: accounts[0] });
    return result.accessToken;
  } catch(e){
    await msalInstance.loginRedirect({ scopes: GRAPH_SCOPES });
    return null;
  }
}

async function graphFetch(endpoint){
  const token = await getGraphToken();
  if(!token) return null;
  const res = await fetch(`https://graph.microsoft.com/v1.0${endpoint}`, {
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" }
  });
  if(!res.ok) throw new Error(`Graph error ${res.status}`);
  return res.json();
}

async function getListIds(){
  if(graphSiteId && graphListId) return;
  const site = await graphFetch(`/sites/indiancityproperties.sharepoint.com:/sites/UDMS/red/IT`);
  graphSiteId = site.id;
  const lists = await graphFetch(`/sites/${graphSiteId}/lists?$filter=displayName eq 'RoomBookings'`);
  graphListId = lists.value[0].id;
}

const ROOMFLOOR_TO_ROOMID = { "M-Floor": "mfloor", "2nd Floor": "floor2" };

function graphItemToBooking(item){
  const f = item.fields;
  // Fix date parsing — adjust for IST (+5:30) offset
  let date = TODAY;
  if(f.BookingDate){
    const d = new Date(f.BookingDate);
    const istDate = new Date(d.getTime() + (5.5 * 60 * 60 * 1000));
    date = `${istDate.getUTCFullYear()}-${pad(istDate.getUTCMonth()+1)}-${pad(istDate.getUTCDate())}`;
  }
  return {
    id: item.id,
    roomId: ROOMFLOOR_TO_ROOMID[f.RoomFloor] || "mfloor",
    date: date,
    start: f.StartTime || "09:00",
    end: f.EndTime || "10:00",
    title: f.Title || "(No title)",
    host: f.HostName || "Unknown",
    dept: f.Department || "",
    status: (f.Status || "Confirmed").toLowerCase(),
  };
}

async function loadBookings(){
  try {
    await getListIds();
    const data = await graphFetch(
      `/sites/${graphSiteId}/lists/${graphListId}/items?expand=fields&$top=500`
    );
    return data.value.map(graphItemToBooking);
  } catch(err){
    console.error("Graph load failed:", err);
    return [];
  }
}


function getUrlFloor(){
  const params = new URLSearchParams(window.location.search);
  return params.get("floor") || "mfloor";
}

let currentFloor = getUrlFloor();
let bookings = [];

function esc(s){ const d=document.createElement("div"); d.textContent = s||""; return d.innerHTML; }

function getRoomStatus(roomId){
  const now = new Date();
  const nowMins = now.getHours()*60+now.getMinutes();
  const list = bookings.filter(b=>b.roomId===roomId && b.date===TODAY && b.status==="confirmed");
  for(const b of list){
    const s=timeToMins(b.start), e=timeToMins(b.end);
    if(nowMins>=s && nowMins<e) return {status:"occupied", booking:b, minutesLeft:e-nowMins};
    if(nowMins<s && s-nowMins<=30) return {status:"soon", booking:b, minsUntil:s-nowMins};
  }
  const next = list.filter(b=>timeToMins(b.start)>nowMins).sort((a,b)=>timeToMins(a.start)-timeToMins(b.start))[0];
  return {status:"free", nextBooking:next};
}

function render(){
  const room = ROOMS[currentFloor];
  const rs = getRoomStatus(currentFloor);
  const isOcc = rs.status==="occupied", isFree = rs.status==="free", isSoon = rs.status==="soon";
  const statusColor = isOcc?"#EF4444":isSoon?"#F59E0B":"#22C55E";
  const statusBg = isOcc?"var(--occ-soft)":isSoon?"var(--soon-soft)":"var(--free-soft)";
  const statusLabel = isOcc?"IN USE":isSoon?"STARTING SOON":"AVAILABLE";

  const todayBks = bookings.filter(b=>b.roomId===currentFloor && b.date===TODAY && b.status==="confirmed").sort((a,b)=>a.start.localeCompare(b.start));
  const now = new Date(), nowMins = now.getHours()*60+now.getMinutes();

  let centerHtml = "";
  if(isOcc && rs.booking){
    centerHtml = `
      <div class="meeting-title">${esc(rs.booking.title)}</div>
      <div class="meeting-time">${fmt12(rs.booking.start)} – ${fmt12(rs.booking.end)}</div>
      <div class="organizer-line">${esc(rs.booking.host)} — ${esc(rs.booking.dept||"")}</div>
      <div class="time-chip" style="background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);color:#EF4444;">Ends in ${rs.minutesLeft} min</div>
      <div class="tap-hint">Tap card to view details</div>`;
  } else if(isSoon && rs.booking){
    centerHtml = `
      <div class="meeting-title">${esc(rs.booking.title)}</div>
      <div class="meeting-time">Starts at ${fmt12(rs.booking.start)}</div>
      <div class="organizer-line">${esc(rs.booking.host)} — ${esc(rs.booking.dept||"")}</div>
      <div class="time-chip" style="background:rgba(245,158,11,0.15);border-color:rgba(245,158,11,0.4);color:#F59E0B;">Starts in ${rs.minsUntil} min</div>
      <div class="tap-hint">Tap card to view details</div>`;
  } else if(isFree){
    centerHtml = rs.nextBooking
      ? `<div class="free-next">Next meeting: <strong style="color:#E8C97A">${esc(rs.nextBooking.title)}</strong> at <strong style="color:#C9A84C">${fmt12(rs.nextBooking.start)}</strong></div>`
      : `<div class="free-next" style="color:#22C55E;font-weight:600">No more meetings scheduled today</div>`;
  }

  const stripHtml = todayBks.length===0 ? `<div class="strip-empty">No bookings today</div>` :
    todayBks.map(b=>{
      const isPast = timeToMins(b.end) < nowMins;
      const isCurr = timeToMins(b.start) <= nowMins && nowMins < timeToMins(b.end);
      return `<div class="strip-card ${isCurr?'current':''} ${isPast?'past':''}" data-id="${b.id}">
        <div class="strip-time" style="color:${isCurr?'#C9A84C':'#fff'}">${fmt12(b.start)} – ${fmt12(b.end)}</div>
        <div class="strip-title">${esc(b.title)}</div>
        <div class="strip-host">${esc(b.host)}</div>
        ${isCurr?'<div class="strip-now">● NOW</div>':''}
        ${isPast?'<div class="strip-done">Completed</div>':''}
      </div>`;
    }).join("");

  document.getElementById("app").innerHTML = `
    <div class="topbar">
      <div class="brand">

      <div class="floor-tag">${room.floor} — Meeting Room</div>
      <div class="live-tag"><span class="live-dot"></span>Live Display</div>
    </div>

    <div class="main">
      <div class="status-block ${isOcc||isSoon?'touchable':''}" id="statusBlock" style="background:${statusBg};border-color:${statusColor};box-shadow:0 0 60px ${statusColor}22;">
        <div class="pulse-wrap">
          <div class="pulse-dot">
            <div class="pulse-ring" style="background:${statusColor}"></div>
            <div class="pulse-core" style="background:${statusColor};box-shadow:0 0 16px ${statusColor}"></div>
          </div>
        </div>
        <div class="status-label" style="color:${statusColor}">${statusLabel}</div>
        ${centerHtml}
      </div>

      <div class="clock-wrap" id="clockWrap"></div>

    <div class="bottom-strip">
      <div class="strip-label">Today's Schedule — ${room.floor}</div>
      <div class="strip-row">${stripHtml}</div>
    </div>
  `;

  if(isOcc || isSoon){
    document.getElementById("statusBlock").onclick = ()=> openDetail(rs.booking, room);
  }
  document.querySelectorAll(".strip-card").forEach(card=>{
    card.onclick = ()=>{
      const b = todayBks.find(x=>x.id===Number(card.dataset.id));
      if(b) openDetail(b, room);
    };
  });

  tickClock();
}

function openDetail(booking, room){
  document.getElementById("detailTitle").textContent = booking.title;
  document.getElementById("detailSub").textContent = `${room.floor} · Meeting Room`;
  document.getElementById("detailRows").innerHTML = `
    <div class="detail-row"><span class="detail-icon">🕐</span><span class="detail-label">Time</span><span class="detail-val">${fmt12(booking.start)} – ${fmt12(booking.end)}</span></div>
    <div class="detail-row"><span class="detail-icon">👤</span><span class="detail-label">Organizer</span><span class="detail-val">${esc(booking.host)}</span></div>
    <div class="detail-row"><span class="detail-icon">🏢</span><span class="detail-label">Department</span><span class="detail-val">${esc(booking.dept||"—")}</span></div>
  `;
  document.getElementById("detailOverlay").classList.add("show");
}
document.getElementById("detailCloseBtn").onclick = ()=> document.getElementById("detailOverlay").classList.remove("show");
document.getElementById("detailOverlay").onclick = (e)=>{ if(e.target.id==="detailOverlay") document.getElementById("detailOverlay").classList.remove("show"); };

function tickClock(){
  const d = new Date();
  const el = document.getElementById("clockWrap");
  if(!el) return;
  let h = d.getHours();
  const period = h>=12 ? "PM" : "AM";
  let h12 = h % 12; if(h12===0) h12=12;
  el.innerHTML = `
    <div class="clock-time">${h12}:${pad(d.getMinutes())}<span class="clock-secs">:${pad(d.getSeconds())} ${period}</span></div>
    <div class="clock-date">${d.toLocaleDateString("en-IN",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}</div>`;
}

/* Demo switcher (hide this block + bar in production by deleting #demoSwitch and the JS below) */
// Hide demo switcher if floor param is in URL
if(new URLSearchParams(window.location.search).get("floor")){
  document.getElementById("demoSwitch").style.display = "none";
} else {
  document.getElementById("app").classList.add("has-demo");
}

const demoSwitch = document.getElementById("demoSwitch");
function updateDemoButtons(){
  demoSwitch.querySelectorAll(".demo-btn").forEach(b=> b.classList.toggle("active", b.dataset.floor===currentFloor));
}
demoSwitch.querySelectorAll(".demo-btn").forEach(b=>{
  b.onclick = ()=>{ currentFloor = b.dataset.floor; updateDemoButtons(); render(); };
});
updateDemoButtons();

render();
// Initialize MSAL then start auto-refresh
initMSAL().then(async ()=>{
  bookings = await loadBookings();
  render();
  setInterval(async ()=>{ bookings = await loadBookings(); render(); }, 30000);
}).catch(err => console.error("MSAL init failed:", err));
setInterval(tickClock, 1000);
</script>
